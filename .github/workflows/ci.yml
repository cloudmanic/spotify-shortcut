#
# Description: GitHub Actions workflow for CI. Runs the test suite on PRs
# and pushes to main. Deployment is handled out-of-band via scripts/deploy.sh
# which pushes a binary to a local Mac (stowe) on the LAN.
#

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...
